version: '3.9'

services:

  mysql:
    image: mysql:8.4
    container_name: mysql
    restart: unless-stopped

    environment:
      MYSQL_ROOT_PASSWORD: Rohit1234
      MYSQL_DATABASE: jobdb
      MYSQL_ROOT_HOST: "%"

    ports:
      - "3306:3306"

    volumes:
      - mysql-data:/var/lib/mysql

    networks:
      - job-network

  kafka:
    image: apache/kafka:4.0.0
    container_name: kafka
    restart: unless-stopped

    ports:
      - "9092:9092"

    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1

    networks:
      - job-network

  jobservice:
    image: jobservice:1.0
    container_name: jobservice
    restart: unless-stopped

    ports:
      - "8081:8081"

    depends_on:
      - mysql
      - kafka

    environment:
      SPRING_PROFILES_ACTIVE: docker

    networks:
      - job-network

  workerservice:
    image: workerservice:1.0
    container_name: workerservice
    restart: unless-stopped

    ports:
      - "8082:8082"

    depends_on:
      - kafka

    environment:
      SPRING_PROFILES_ACTIVE: docker

    networks:
      - job-network

  notificationservice:
    image: notificationservice:1.0
    container_name: notificationservice
    restart: unless-stopped

    ports:
      - "8083:8083"

    depends_on:
      - kafka

    environment:
      SPRING_PROFILES_ACTIVE: docker

    networks:
      - job-network

volumes:
  mysql-data:

networks:
  job-network: