server.port=8081

spring.application.name=jobservice

# MySQL (DOCKER)
spring.datasource.url=jdbc:mysql://mysql:3306/jobdb?useSSL=false&allowPublicKeyRetrieval=true&connectTimeout=30000
spring.datasource.username=root
spring.datasource.password=Rohit1234
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false

# IMPORTANT: avoid startup crash
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect

# Kafka (DOCKER)
spring.kafka.bootstrap-servers=kafka:9092

spring.kafka.consumer.group-id=job-group
spring.kafka.consumer.auto-offset-reset=earliest
spring.kafka.consumer.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.value-deserializer=org.apache.kafka.common.serialization.StringDeserializer

spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.value-serializer=org.apache.kafka.common.serialization.StringSerializer

# resilience
spring.datasource.hikari.initialization-fail-timeout=0
spring.datasource.hikari.connection-timeout=30000